---
name: "🐛 Bug Report"
description: Report a bug in the Valkey GLIDE Rust client
title: "(topic): (short issue description)"
labels: ["bug 🐞", "Untriaged user issue"]
assignees: []
body:
    - type: textarea
      id: description
      attributes:
          label: Describe the bug
          description: A clear and concise description of the bug.
      validations:
          required: true

    - type: textarea
      id: expected
      attributes:
          label: Expected Behavior
          description: What did you expect to happen?
      validations:
          required: true

    - type: textarea
      id: current
      attributes:
          label: Current Behavior
          description: |
              What actually happened? Include full errors, stack traces, and relevant logs.
      validations:
          required: true

    - type: textarea
      id: reproduction
      attributes:
          label: Reproduction Steps
          description: Minimal code and steps to reproduce the behavior.
      validations:
          required: true

    - type: input
      id: crate-version
      attributes:
          label: Crate version
          description: The `valkey-glide` (glide) crate version or git revision.
      validations:
          required: true

    - type: input
      id: server-version
      attributes:
          label: Valkey / Redis OSS version
          description: Output of `INFO server` (e.g. valkey 8.1.3).
      validations:
          required: false

    - type: input
      id: rust-version
      attributes:
          label: Rust toolchain
          description: Output of `rustc --version`.
      validations:
          required: false
