---
name: "🚀 Feature Request"
description: Suggest a feature or enhancement for the Valkey GLIDE Rust client
title: "(topic): (short feature description)"
labels: ["enhancement", "Untriaged user issue"]
assignees: []
body:
    - type: textarea
      id: problem
      attributes:
          label: Is your feature request related to a problem?
          description: A clear and concise description of the problem or use case.
      validations:
          required: true

    - type: textarea
      id: solution
      attributes:
          label: Describe the solution you'd like
          description: What you want to happen (e.g. a specific command/API).
      validations:
          required: true

    - type: textarea
      id: alternatives
      attributes:
          label: Alternatives considered
          description: Any alternative solutions or workarounds you've considered.
      validations:
          required: false

    - type: textarea
      id: context
      attributes:
          label: Additional context
          description: Links to the equivalent Python GLIDE API, Valkey docs, etc.
      validations:
          required: false
