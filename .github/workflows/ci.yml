# CI for the valkey-glide Rust crate, baselined on upstream valkey-glide's
# `lint-rust` action + `rust.yml` (fmt / clippy with & without features / doc /
# feature-check / test / coverage / cargo-deny).
#
# The crate links glide-core + its vendored redis-rs via *git* deps pinned to a
# rev of valkey-io/valkey-glide, so Cargo fetches them automatically — CI needs
# network access to GitHub (GitHub-hosted runners have it) but no manual checkout
# of the monorepo. crates.io publishing remains blocked by git deps (README).
name: CI

on:
    push:
        branches: [master, main]
    pull_request: {}

permissions:
    contents: read

jobs:
    lint:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
            - name: Install Rust toolchain
              run: rustup toolchain install stable --profile minimal --component rustfmt,clippy && rustup default stable
            - uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
              with:
                  path: target
                  key: x86_64-unknown-linux-gnu-lint
            - name: Format
              run: cargo fmt --all -- --check
            - name: Clippy (all features)
              run: cargo clippy --all-features --all-targets -- -D warnings
            - name: Clippy (no features)
              run: cargo clippy --all-targets -- -D warnings
            - name: Docs
              env:
                  RUSTDOCFLAGS: "-D warnings"
              run: cargo doc --no-deps --document-private-items

    test:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
            - name: Install Rust toolchain
              run: rustup toolchain install stable --profile minimal && rustup default stable
            - uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
              with:
                  path: target
                  key: x86_64-unknown-linux-gnu-test
            - name: Install a Valkey/Redis server for integration tests
              run: |
                  sudo apt-get update
                  sudo apt-get install -y valkey-server || sudo apt-get install -y redis-server
                  echo "VALKEY_SERVER_PATH=$(command -v valkey-server || command -v redis-server)" >> "$GITHUB_ENV"
            - name: Build (debug)
              run: cargo build --verbose
            - name: Build (release)
              run: cargo build --release --verbose
            - name: Feature check
              run: |
                  cargo check --no-default-features
                  cargo check --all-features
                  cargo check --benches --all-features
            - name: Test
              run: cargo test --verbose

    coverage:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
            - name: Install Rust toolchain
              run: rustup toolchain install stable --profile minimal --component llvm-tools-preview && rustup default stable
            - name: Install cargo-llvm-cov
              run: cargo install --locked cargo-llvm-cov
            - name: Install a Valkey/Redis server
              run: |
                  sudo apt-get update
                  sudo apt-get install -y valkey-server || sudo apt-get install -y redis-server
                  echo "VALKEY_SERVER_PATH=$(command -v valkey-server || command -v redis-server)" >> "$GITHUB_ENV"
            - name: Coverage
              run: cargo llvm-cov --all-features --workspace --lcov --output-path lcov.info --summary-only
            - name: Upload coverage to Codecov
              uses: codecov/codecov-action@v5
              with:
                  files: lcov.info
                  # Private repos require a CODECOV_TOKEN repo secret; public repos
                  # work tokenless. Don't fail CI if upload can't authenticate.
                  fail_ci_if_error: false
              env:
                  CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

    deny:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
            - name: Install Rust toolchain
              run: rustup toolchain install stable --profile minimal && rustup default stable
            - name: cargo-deny
              run: |
                  cargo install --locked cargo-deny
                  cargo deny check
